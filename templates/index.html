<!doctype html>
<html>
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#1a1a1a" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/static/icon-192.png" />
    <link href="/static/style.css" rel="stylesheet" />
    <title>Stream Chat</title>
  </head>
  <body>
    <div id="server-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h2>Where are you live?</h2>
        <div class="modal-buttons-row">
          <button id="btn-jartex" class="btn btn-jartex">Jartex</button>
          <button id="btn-pika" class="btn btn-pika">Pika</button>
        </div>
        <button id="btn-none" class="btn btn-none">None</button>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="navbar">
      <div id="status-dot"></div>
    </div>
    <div id="messages"></div>
    <script src="/static/script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("SW registered!", reg))
            .catch((err) => console.log("SW reg error:", err));
        });
      }
    </script>
  </body>
</html>
